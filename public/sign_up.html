<!DOCTYPE html>
<html lang="en" style="background-color:rgba(228, 228, 228, 0.877);">
<head>
<meta charset="UTF-8">
<title>Sign Up</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<header>
    <h1>Lilly Brothers Painting</h1>
    <nav id="navBar" class="main-nav"></nav>
</header>

<main>
<section class="quote-section">

<h2>Create Your Account</h2>

<div class="form-row">

<form action="/signup" method="POST" class="quote-form">

    <h3>Sign Up</h3>

    <div class="form-row", style="display: inline-flex;">
        <div class="input-group">
            <label>First Name</label>
            <input type="text" placeholder="Example: John" name="first_name" required>
        </div>

        <div class="input-group">
            <label>Last Name</label>
            <input type="text" placeholder="Example: Doe" name="last_name" required>
        </div>
    </div>

    <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="john.doe@example.com" name="email" required>
    </div>

    <div class="input-group">
        <label>Phone Number</label>
        <input type="tel" placeholder="123-456-7890" name="phone_number" required>
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="********" name="password" required>
    </div>

    <h5>Already have an account? <a href="/login">Login</a></h5>

    <button class="quote-button">Sign Up</button>

</form>

</div>

</section>
</main>

<footer>
<p>© 2026 Lilly Brothers Painting</p>
</footer>

<script>
fetch("/current-user")
.then(res => res.json())
.then(data => {
    const nav = document.getElementById("navBar");

    if (data.loggedIn) {
        nav.innerHTML = `
            <a href="/">Home</a>
            <a href="/quote">Get Quote</a>

            <div class="dropdown">
                <button class="dropbtn" onclick="toggleMenu(event, 'aboutMenu')">About us ▾</button>
                <div id="aboutMenu" class="dropdown-content">
                    <a href="/contact.html">Contact</a>
                    <a href="/about.html">About Us</a>
                </div>
            </div>

            <div class="dropdown">
                <button class="dropbtn" onclick="toggleMenu(event, 'accountMenu')">Account ▾</button>
                <div id="accountMenu" class="dropdown-content">
                    <span class="dropdown-user">Welcome, ${data.username}</span>
                    <a href="/user">My Page</a>
                    ${data.isAdmin ? '<a href="/admin">Admin Panel</a>' : ''}
                    <a href="/logout">Logout</a>
                </div>
            </div>
        `;
    } else {
        nav.innerHTML = `
            <a href="/">Home</a>
            <a href="/quote">Get Quote</a>

            <div class="dropdown">
                <button class="dropbtn" onclick="toggleMenu(event, 'aboutMenu')">About us ▾</button>
                <div id="aboutMenu" class="dropdown-content">
                    <a href="/contact.html">Contact</a>
                    <a href="/about.html">About</a>
                </div>
            </div>

            <div class="dropdown">
                <button class="dropbtn" onclick="toggleMenu(event, 'accountMenu')">Account ▾</button>
                <div id="accountMenu" class="dropdown-content">
                    <a href="/login">Login</a>
                </div>
            </div>
        `;
    }
})
.catch(err => console.log(err));

function toggleMenu(event, menuId) {
    event.stopPropagation();

    const allMenus = document.querySelectorAll(".dropdown-content");
    allMenus.forEach(menu => {
        if (menu.id !== menuId) {
            menu.style.display = "none";
        }
    });

    const menu = document.getElementById(menuId);

    if (menu.style.display === "block") {
        menu.style.display = "none";
    } else {
        menu.style.display = "block";
    }
}

window.addEventListener("click", function() {
    const allMenus = document.querySelectorAll(".dropdown-content");
    allMenus.forEach(menu => {
        menu.style.display = "none";
    });
});
</script>

</body>
</html>
