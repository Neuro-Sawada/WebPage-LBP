<!DOCTYPE html>
<html lang="en" style="background-color:rgba(228, 228, 228, 0.877);">
<head>
<meta charset="UTF-8">
<title>Contact - Lilly Brothers Painting</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<header>
    <h1>Lilly Brothers Painting</h1>
    <nav id="navBar" class="main-nav"></nav>
</header>

<main>
<section class="contact-page" style="margin-top: 50px;">

    <div class="page-card">
        <h2>Contact Us</h2>
        <p class="page-subtitle">We’re here to help with your next painting project.</p>

        <div class="contact-grid">

            <div class="contact-card">
                <h3>Phone</h3>
                <p>(513) 555-1234</p>
            </div>

            <div class="contact-card">
                <h3>Email</h3>
                <p>info@lillybrotherspainting.com</p>
            </div>

            <div class="contact-card">
                <h3>Location</h3>
                <p>Cincinnati, Ohio</p>
            </div>

        </div>
    </div>

    <div class="page-card">
        <h3>Send Us a Message</h3>

        <form class="contact-form">
            <input type="text" placeholder="Your Name">
            <input type="email" placeholder="Your Email">
            <textarea rows="5" placeholder="Your Message"></textarea>

            <button type="submit" class="quote-button">Send Message</button>
        </form>
    </div>

</section>
</main>

<footer>
<p>© 2026 Lilly Brothers Painting</p>
</footer>

<script>
fetch("/current-user")
.then(res => res.json())
.then(data => {
    const nav = document.getElementById("navBar");

    if (data.loggedIn) {
        nav.innerHTML = `
            <a href="/">Home</a>
            <a href="/quote">Get Quote</a>

            <div class="dropdown">
                <button class="dropbtn" onclick="toggleMenu(event, 'aboutMenu')">About us ▾</button>
                <div id="aboutMenu" class="dropdown-content">
                    <a href="/contact">Contact</a>
                    <a href="/about">About Us</a>
                </div>
            </div>

            <div class="dropdown">
                <button class="dropbtn" onclick="toggleMenu(event, 'accountMenu')">Account ▾</button>
                <div id="accountMenu" class="dropdown-content">
                    <span class="dropdown-user">Welcome, ${data.username}</span>
                    <a href="/user">My Page</a>
                    ${data.isAdmin ? '<a href="/admin">Admin Panel</a>' : ''}
                    <a href="/logout">Logout</a>
                </div>
            </div>
        `;
    } else {
        nav.innerHTML = `
            <a href="/">Home</a>
            <a href="/quote">Get Quote</a>

            <div class="dropdown">
                <button class="dropbtn" onclick="toggleMenu(event, 'aboutMenu')">About us ▾</button>
                <div id="aboutMenu" class="dropdown-content">
                    <a href="/contact.html">Contact</a>
                    <a href="/about.html">About</a>
                </div>
            </div>

            <div class="dropdown">
                <button class="dropbtn" onclick="toggleMenu(event, 'accountMenu')">Account ▾</button>
                <div id="accountMenu" class="dropdown-content">
                    <a href="/login">Login</a>
                </div>
            </div>
        `;
    }
})
.catch(err => console.log(err));

function toggleMenu(event, menuId) {
    event.stopPropagation();

    const allMenus = document.querySelectorAll(".dropdown-content");
    allMenus.forEach(menu => {
        if (menu.id !== menuId) {
            menu.style.display = "none";
        }
    });

    const menu = document.getElementById(menuId);

    if (menu.style.display === "block") {
        menu.style.display = "none";
    } else {
        menu.style.display = "block";
    }
}

window.addEventListener("click", function() {
    const allMenus = document.querySelectorAll(".dropdown-content");
    allMenus.forEach(menu => {
        menu.style.display = "none";
    });
});
</script>

</body>
</html>
